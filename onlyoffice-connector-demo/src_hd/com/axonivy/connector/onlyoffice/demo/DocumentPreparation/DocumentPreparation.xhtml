<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
	<ui:composition template="/layouts/frame-10-full-width.xhtml">
		<ui:define name="title">DocumentSelection</ui:define>
		<ui:define name="content">
			<h:form>
				<p:growl />
				<div class="grid">
					<div class="col-12 md:col-6 lg:col-4">
						<h1>Prepare documents</h1>
					</div>
				</div>
				<div class="grid">
					<div class="col-12 md:col-12 lg:col-12">
						Documents will be attached to a general business case.
							<h:outputText rendered="#{not data.ctrl.businessCasePersistent}" escape="false">
								<br/>
								<strong>
									This business case will be created (persisted) the first time you proceed from this dialog.
								</strong>
							</h:outputText>
					</div>
				</div>
				<div class="grid">
					<div class="col-12 md:col-6 lg:col-4">
						<p:fileUpload mode="advanced" accept=".pdf,.docx,.xlsx,.pptx" 
							dragDropSupport="true" auto="true" allowTypes="/(\.|\/)(pdf|docx|xlsx|pptx)$/"
							listener="#{data.ctrl.handleFileUpload}"
							update="@form"/>
					</div>
				</div>
				<div class="grid">
					<div class="col-12 md:col-12 lg:col-12">
						<p:dataTable value="#{data.ctrl.documents}" var="doc"
							selectionMode="single" selection="#{data.ctrl.selectedDocument}" rowKey="#{doc.name}">
							<p:ajax event="rowSelect" update="@form"/>
							<p:column headerText="Name">
								<h:outputText value="#{doc.name}" />
							</p:column>
							<p:column>
								<p:commandButton value="Download" ajax="false" update="@form">
									<p:fileDownload value="#{data.ctrl.getFileData(doc.name)}" />
								</p:commandButton>
							</p:column>
							<!-- 
							<p:dataViewListItem>
									<div class="col-12 md:col-6 lg:col-2">
									</div>
									<div class="col-12 md:col-6 lg:col-1">
										<p:commandButton value="Select" actionListener="#{data.ctrl.handleSelect(doc.name)}" update="@form"/>
									</div>
									<div class="col-12 md:col-6 lg:col-1">
									</div>
								</div>
							</p:dataViewListItem>
							 -->
						</p:dataTable>
					</div>
				</div>
				<p:spacer height="1em" />
				<p:outputPanel rendered="#{data.ctrl.selectedDocument == null}">
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-12">
							Please select a document to continue.
						</div>
					</div>
				</p:outputPanel>
				<p:outputPanel id="editor" rendered="#{data.ctrl.selectedDocument != null}">
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-12">
							Selected: #{data.ctrl.selectedDocument}
						</div>
					</div>
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-12">
							
						</div>
					</div>

					<div class="command-btns">
						<p:commandLink id="cancel" actionListener="#{ivyWorkflowView.cancel()}" process="@this" value="Cancel" />
						<p:commandButton id="proceed" actionListener="#{logic.close}" value="Proceed" update="@form" icon="pi pi-check" />
					</div>
				</p:outputPanel>
			</h:form>

		</ui:define>
	</ui:composition>
</h:body>

</html>
