<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
	<ui:composition template="/layouts/frame-10-full-width.xhtml">
		<ui:define name="title">Document Preparation</ui:define>
		<ui:define name="content">
			<script>
   				window.isWorkingOnATask = false;
			</script>
			<ic:com.axonivy.connector.onlyoffice.OnlyOfficeScript />
			<h:form>
				<p:growl />
				<div class="grid">
					<div class="col-12 md:col-12 lg:col-4"/>
					<div class="col-12 md:col-6 lg:col-4">
						<h1>Prepare document</h1>
					</div>
				</div>
				<p:outputPanel rendered="#{data.ctrl.document == null}">
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-4"/>
						<div class="col-12 md:col-12 lg:col-4">
							Please upload a file. ONLYOFFICE supports most common office formats. For a list of supported
							formats please see <a href="https://api.onlyoffice.com/docs/docs-api/usage-api/config/document/" target="_blank">https://api.onlyoffice.com/docs/docs-api/usage-api/config/document/</a>.
							In this demo, all documents will be attached to a general business case. 
						</div>
					</div>
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-4"/>
						<div class="col-12 md:col-12 lg:col-4">
							<p:fileUpload mode="advanced" dragDropSupport="true" auto="true"
								listener="#{data.ctrl.handleFileUpload}" update="@form" />
						</div>
					</div>
				</p:outputPanel>
				<p:outputPanel rendered="#{data.ctrl.document != null}">
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-12" style="height: 800px;">
							<ic:com.axonivy.connector.onlyoffice.OnlyOfficeEditor
								editGroup="#{data.ctrl.editGroup}"
								documentId="#{data.ctrl.document.uuid()}"
								fileName="#{data.ctrl.document.name}" />
						</div>
					</div>
					<div class="command-btns">
						<p:commandLink id="cancel" actionListener="#{ivyWorkflowView.cancel()}" process="@this" value="Cancel" />
						<p:commandButton id="proceed" actionListener="#{logic.close}" value="Proceed" update="@form" icon="pi pi-check" />
					</div>
				</p:outputPanel>
			</h:form>

		</ui:define>
	</ui:composition>
</h:body>

</html>
