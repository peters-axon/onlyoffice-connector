<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
	<ui:composition template="/layouts/frame-10-full-width.xhtml">
		<ui:define name="title">ONLYOFFICE Embedding Demo</ui:define>
		<ui:define name="content">
			<script type="text/javascript" src="#{data.ctrl.editorUrl}" />
			<script>
   				window.isWorkingOnATask = false;
			</script>
			<h:form>
				<p:growl />
				<div class="grid">
					<div class="col-12 md:col-6 lg:col-4">
						<h1>Edit documents.</h1>
					</div>
				</div>

				<p:spacer height="1em" />

				<div class="grid">
					<div class="col-12 md:col-12 lg:col-11" style="height: 800px;">
						<div id="placeholder"></div>
					</div>
				</div>

				<p:spacer height="1em" />

				<div class="command-btns">
					<p:commandButton value="Save" actionListener="#{data.ctrl.save}"/>
					<p:commandLink id="cancel" actionListener="#{ivyWorkflowView.cancel()}" process="@this" value="Cancel" />
				</div>
				<script>
					var config = #{data.ctrl.config};
					var docEditor = new DocsAPI.DocEditor("placeholder", config);
				</script>
			</h:form>
		</ui:define>
	</ui:composition>
</h:body>

</html>
