<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:cc="http://xmlns.jcp.org/jsf/composite" xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui" xmlns:pe="http://primefaces.org/ui/extensions">
<cc:interface componentType="IvyComponent">
 	<cc:attribute name="editGroup" type="java.lang.String" required="true" shortDescription="Everybody using this group can edit simultaneously."/>
	<cc:attribute name="documentId" type="java.lang.String" required="true" shortDescription="Internal Id of the document, which will be used to load or save."/>
	<cc:attribute name="fileName" type="java.lang.String" required="true" shortDescription="File name of the document, the extension defines the typ of editor started."/>
 	<cc:attribute name="configuration" type="java.lang.String" required="false" shortDescription="ONLYOFFICE editor configuration (if absent, dynamic data will be filled in and signed automatically)."/>
</cc:interface>

<cc:implementation>
		<div id="onlyofficePlaceholder"/>
		<script>
			var config = #{onlyoffice.putIfAbsentAndSign(cc.attrs.editGroup, cc.attrs.documentId, cc.attrs.fileName, cc.attrs.configuration)};
			var docEditor = new DocsAPI.DocEditor("onlyofficePlaceholder", config);
		</script>
</cc:implementation>
</html>
